<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de compras</title>

    <link rel="stylesheet" href="inde.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="container">
        <div class="desktop-only">
            <img src="/assets/icons/logo.svg" alt="logo">
        </div>
        <div>
            <a href="#"><img src="/assets/icons/link button.svg" alt="voltar a homepage"></a>
            <h1>Compras da semana</h1>
        </div>
    </header>
    <main class="container">
        <div id="adicionar-tarefas">
            <input type="text" id="nova-tarefa" placeholder="Adicione um novo item">
            <button type="submit" id="btn-adicionar">Adicionar item</button>
        </div>
        <ul id="lista-de-compras">
        </ul>
    </main>
    <footer class="container">
        <div id="alert">
            <img src="/assets/icons/warning-circle-filled.svg" alt="">
            <span>O item foi removido da lista</span>
            <button type="submit" id="btn-fechar">
                <img src="/assets/icons/delete-small.svg" alt="deletar">
            </button>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
